[phases.setup]
nixPkgs = [
    "php82",
    "php82Extensions.pdo",
    "php82Extensions.pdo_mysql", 
    "php82Extensions.mbstring",
    "php82Extensions.xml",
    "php82Extensions.curl",
    "php82Extensions.zip",
    "php82Extensions.intl",
    "composer",
    "nodejs_20",
    "npm-9_x"
]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "npm run build",
    "php artisan optimize"
]

[start]
cmd = "php artisan migrate --seed --force && php artisan storage:link && php artisan optimize:clear && php artisan optimize && php artisan serve --host=0.0.0.0 --port=$PORT"